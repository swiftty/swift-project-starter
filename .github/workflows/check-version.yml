name: Periodic Update Check
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check_and_commit:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.KICK_STARTER_CLIENT_ID }}
          private-key: ${{ secrets.KICK_STARTER_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: ./.github/actions/setup

      - name: check version
        run: |
          bash check-version
